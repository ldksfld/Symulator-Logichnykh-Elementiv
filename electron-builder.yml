appId: ua.edu.sleschi
productName: СЛЕСЧ
copyright: "Навчальний застосунок СЛЕСЧ"

directories:
  output: release
  buildResources: public

files:
  - dist/**/*
  - dist-electron/**/*
  - "!**/*.map"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: public/icon.ico

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: public/icon.icns

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: public/icon.png
  category: Education

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: СЛЕСЧ
